name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - macOS app
        - CLI
        - Relay
        - Landing page
        - Release/Homebrew
        - Documentation
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or alternatives
      description: What options have you considered?
