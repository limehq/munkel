name: Deploy Landing Preview

on:
  pull_request:
    paths:
      - "apps/landing/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/deploy-landing-preview.yml"

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bunx turbo build --filter=@munkel/landing
        env:
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}

      - name: Upload preview version
        id: preview
        working-directory: apps/landing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          bunx wrangler versions upload --preview-alias "pr-${{ github.event.number }}" | tee upload.log
          url="$(grep -oiE "https://pr-${{ github.event.number }}-[a-z0-9.-]+\.workers\.dev" upload.log | head -n1 || true)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url="${{ steps.preview.outputs.url }}"
          if [ -z "$url" ]; then
            echo "No preview URL emitted (workers.dev preview URLs not enabled for this Worker yet); skipping comment."
            exit 0
          fi
          gh pr comment "${{ github.event.number }}" --edit-last --create-if-none \
            --body "🔎 Landing preview: $url (commit \`${{ github.event.pull_request.head.sha }}\`)"
