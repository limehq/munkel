name: CodeQL

# JavaScript/TypeScript analysis. The JS/TS extractor needs no build and finishes
# in well under a minute, so it scans every pull request, every push to main, and
# the weekly schedule. Swift lives in codeql-swift.yml instead: its extractor is
# CPU-bound (~6 min, no cross-run cache), so it runs on push + schedule only, off
# the PR path entirely.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "12 5 * * 2"
  workflow_dispatch:

# One in-flight JS/TS analysis per ref: a newer commit cancels the previous run.
# Swift uses a separate group so the two languages never cancel each other.
concurrency:
  group: codeql-js-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze javascript-typescript
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Least privilege: writes live on the job, not the workflow top level.
    permissions:
      contents: read # checkout
      security-events: write # upload CodeQL results
      actions: read # CodeQL reads workflow run metadata

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: javascript-typescript
          build-mode: none
          queries: +security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:javascript-typescript"
