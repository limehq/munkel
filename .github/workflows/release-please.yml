name: Release Please

# Maintains a rolling release PR from Conventional Commits on main
# (feat: → minor, fix: → patch, feat!: → breaking). Merging that PR
# creates tag + GitHub release with changelog, then dispatches the
# desktop build (release.yml) for the new tag — tags created with
# GITHUB_TOKEN don't fire `on: push` workflows, so we dispatch explicitly.

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    # Least privilege: writes live on the job, not the workflow top level.
    permissions:
      contents: write # create the release tag + GitHub release
      pull-requests: write # maintain the rolling release PR
      actions: write # dispatch release.yml for the new tag
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp

      - name: Trigger desktop release build
        if: ${{ steps.rp.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref "${{ steps.rp.outputs.tag_name }}"
