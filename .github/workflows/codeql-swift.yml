name: CodeQL (Swift)

# Swift is split out of codeql.yml and runs on push to main + the weekly schedule
# only — deliberately NOT on pull_request. Its extractor is CPU-bound (~6 min, no
# cross-run cache, no buildless mode) and runs on GitHub-hosted macOS (billed at
# 10x), so running it per-PR is slow and costly. It also can't run *conditionally*
# on PRs without tripping code scanning's "configuration not found" diff warning
# (every PR that doesn't re-run Swift fails to reproduce main's Swift config).
# Push + schedule keep main and the weekly scan fully covered, and Swift alerts
# still surface on PRs as they merge.
on:
  push:
    branches: [main]
  schedule:
    - cron: "12 5 * * 2"
  workflow_dispatch:

# One in-flight Swift analysis per ref: a newer push cancels the previous run.
concurrency:
  group: codeql-swift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze swift
    # macos-26 for Swift 6.2 (KeyboardShortcuts 3.x manifest needs swift-tools 6.2,
    # shipped with Xcode 26; macos-latest is still macOS 15 / Xcode 16).
    runs-on: macos-26
    timeout-minutes: 30
    # Least privilege: writes live on the job, not the workflow top level.
    permissions:
      contents: read # checkout
      security-events: write # upload CodeQL results
      actions: read # CodeQL reads workflow run metadata

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: swift
          build-mode: manual
          queries: +security-extended

      - name: Build Swift package
        working-directory: apps/macos
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:swift"
